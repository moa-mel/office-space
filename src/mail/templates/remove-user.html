<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Office Membership Update</title>
  </head>

  <body
    style="
      margin: 0;
      padding: 0;
      background: #f4f6f8;
      font-family: Arial, sans-serif;
    "
  >
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center" style="padding: 50px 20px">
          <table
            width="600"
            cellpadding="0"
            cellspacing="0"
            style="
              max-width: 600px;
              background: #ffffff;
              border-radius: 14px;
              overflow: hidden;
              box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            "
          >
            <!-- HERO -->
            <tr>
              <td style="padding: 40px 35px">
                <h2 style="margin: 0 0 10px 0; color: #111827">
                  Office Membership Update
                </h2>

                <h3 style="color: #333; margin-top: 20px; font-weight: normal;">
                  Hello <strong>{{name}}</strong>,
                </h3>

                <p style="color: #555; font-size: 15px; line-height: 1.7">
                  Sorry to inform you that you have been removed from <strong>{{office_name}}</strong>.
                </p>

                <div
                  style="
                    margin-top: 30px;
                    border-top: 1px solid #eee;
                    padding-top: 20px;
                    font-size: 12px;
                    color: #999;
                  "
                >
                </div>
              </td>
            </tr>

            <!-- FOOTER -->
            <tr>
              <td
                style="
                  background: #f9fafb;
                  text-align: center;
                  padding: 18px;
                  font-size: 12px;
                  color: #888;
                "
              >
                © {{year}} Office Space. All rights reserved.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
